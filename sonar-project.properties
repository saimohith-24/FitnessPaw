# SonarQube Project Configuration for FitnessPaw
sonar.projectKey=saimohith-24_FitnessPaw
sonar.projectName=FitnessPaw
sonar.projectVersion=1.0

# Path to the source directories
sonar.sources=android/app/src/main/java,web/src

# Path to the test directories
sonar.tests=android/app/src/test/java,web/src/context

# Exclude patterns
sonar.exclusions=**/node_modules/**,**/build/**,**/.gradle/**,**/dist/**,**/public/**,**/*.png,**/*.svg,**/*.webp

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Test coverage paths (optional configuration)
sonar.kotlin.detekt.reportPaths=android/app/build/reports/detekt.xml
sonar.javascript.lcov.reportPaths=web/coverage/lcov.info
